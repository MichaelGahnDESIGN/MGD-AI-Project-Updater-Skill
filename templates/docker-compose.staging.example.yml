services:
  proxy:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - mailpit

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env.staging.local
    volumes:
      - ./:/app
    depends_on:
      - db
      - mailpit

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: app_staging
      MARIADB_USER: app
      MARIADB_PASSWORD: app-local-only
      MARIADB_ROOT_PASSWORD: root-local-only
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

volumes:
  db_data:
